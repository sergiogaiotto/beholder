    required: true
  empreiteira:
    source: EMPREITEIRA
    required: true
  contrato_num_sap:
    source: CONTRATO_NUM
    required: true
  ref_ws:
    source: REF WS
    required: true
  numero_fornecedor_sap:
    source: NUMERO_FORNECEDOR SAP
    required: true
  cnpj:
    source: CNPJ
    required: true
