# Beholder — stack de DESENVOLVIMENTO local.
#
# Para subir em DEV:
#     docker compose -f docker-compose.dev.yml up
#
# Diferenças vs `docker-compose.yml` (produção):
#   - SEM Caddy (sem TLS, sem domínio): app exposta direto em 8100
#     (porta diferente da Vértice para coexistirem na mesma estação dev).
#   - Postgres exposto em 5432 do host para você conectar via DBeaver/psql.
#   - Volume bind-mount `./app:/app/app` para hot-reload do uvicorn.
#   - Mock de LLM padrão (sem chaves).
#
# DESIGN: este compose é AUTOCONTIDO — DATABASE_URL, POSTGRES_USER/DB/PASSWORD
# e APP_SECRET_KEY são fixos aqui dentro porque apontam para o serviço
# `postgres` criado neste mesmo compose. O Docker Compose carrega `.env` da
# raiz automaticamente (para variable substitution); se você tem um `.env`
# de outro ambiente apontando para um Postgres externo, esses valores
# vazariam pelo `${VAR:-default}` e o container tentaria conectar no
# Postgres errado. Por isso evitamos a indireção aqui. Para customizar
# portas locais (conflito com outro serviço), use as duas únicas vars
# externas: APP_HOST_PORT e POSTGRES_HOST_PORT.

services:
  postgres:
    # [v1.1 Fase 0] Trocado de postgres:16-alpine para pgvector/pgvector:pg16
    # — necessário para a extension `vector` usada por payments.contract_clause
    # (embeddings) e analytics R7. Mesma versão major do PG (16), totalmente
    # compatível com volumes existentes.
    image: pgvector/pgvector:pg16
    container_name: beholder-postgres-dev
    environment:
      POSTGRES_USER: beholder
      POSTGRES_PASSWORD: beholder
      POSTGRES_DB: beholder
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "random_page_cost=1.1"
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - beholder_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beholder -d beholder"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # [Fase 0] Redis — broker do dramatiq (worker assíncrono pra extração PDF
  # + reconciliação batch). Single-node em dev; em prod usar cluster.
  redis:
    image: redis:7-alpine
    container_name: beholder-redis-dev
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - beholder_redisdata_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # [Fase 0] MinIO — S3-compatible local. DocumentStore S3 adapter usa este em
  # dev (`S3_ENDPOINT_URL=http://minio:9000`); em prod aponta pra AWS S3 real.
  # Console web: http://localhost:9001 (login: beholder/beholder123).
  minio:
    image: minio/minio:latest
    container_name: beholder-minio-dev
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: beholder
      MINIO_ROOT_PASSWORD: beholder123
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"     # API S3
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Console web
    volumes:
      - beholder_miniodata_dev:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  beholder:
    build: .
    container_name: beholder-dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://beholder:beholder@postgres:5432/beholder
      APP_SECRET_KEY: dev-only-not-a-secret-change-in-prod
      APP_ENV: development
      PG_POOL_MIN_SIZE: "5"
      PG_POOL_MAX_SIZE: "20"
      # [Fase 0] Pool dedicado payments
      PAYMENTS_POOL_MIN_SIZE: "2"
      PAYMENTS_POOL_MAX_SIZE: "10"
      # [Fase 0] Redis + S3/MinIO + DocumentStore
      REDIS_URL: redis://redis:6379/0
      DOCUMENT_STORE_MODE: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: beholder
      S3_SECRET_KEY: beholder123
      S3_BUCKET: beholder-documents
      S3_REGION: us-east-1
      UVICORN_WORKERS: "1"
      CLARO_HUB_API_KEY: ${CLARO_HUB_API_KEY:-}
      CLARO_HUB_ENDPOINT: ${CLARO_HUB_ENDPOINT:-https://hub-gpus.claro.com.br/gpt20}
      CLARO_HUB_MODEL: ${CLARO_HUB_MODEL:-openai/gpt-oss-20b}
      MARITACA_API_KEY: ${MARITACA_API_KEY:-}
      MARITACA_MODEL: ${MARITACA_MODEL:-sabia-4}
      MARITACA_BASE_URL: ${MARITACA_BASE_URL:-https://chat.maritaca.ai/api}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
    ports:
      - "${APP_HOST_PORT:-8100}:8000"
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # [Fase 0] Worker dramatiq — processa jobs assíncronos (extração PDF,
  # reconciliação batch). Mesma image do beholder (dependências compartilhadas),
  # apenas comando diferente. Em prod escala-se horizontalmente.
  worker:
    build: .
    container_name: beholder-worker-dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://beholder:beholder@postgres:5432/beholder
      APP_SECRET_KEY: dev-only-not-a-secret-change-in-prod
      APP_ENV: development
      PG_POOL_MIN_SIZE: "2"
      PG_POOL_MAX_SIZE: "5"
      PAYMENTS_POOL_MIN_SIZE: "2"
      PAYMENTS_POOL_MAX_SIZE: "8"
      REDIS_URL: redis://redis:6379/0
      DOCUMENT_STORE_MODE: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: beholder
      S3_SECRET_KEY: beholder123
      S3_BUCKET: beholder-documents
      WORKER_PROCESSES: "1"
      WORKER_THREADS_PER_PROCESS: "4"
      CLARO_HUB_API_KEY: ${CLARO_HUB_API_KEY:-}
      MARITACA_API_KEY: ${MARITACA_API_KEY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    command: dramatiq app.workers --processes 1 --threads 4

volumes:
  beholder_pgdata_dev:
  beholder_redisdata_dev:
  beholder_miniodata_dev:
